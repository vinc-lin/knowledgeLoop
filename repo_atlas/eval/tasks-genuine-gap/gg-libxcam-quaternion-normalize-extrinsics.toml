id = "gg-libxcam-quaternion-normalize-extrinsics"
kind = "dev"
repo = "libxcam"
prompt = "In ImageProjector::calc_camera_extrinsics (xcore/image_projector.cpp, both overloads), the orientation quaternion is built by summing the interpolated orientation with the gyro-drift quaternion: `Quaternd quat = interp_orientation(...) + Quaternd(_calib_params.gyro_drift);`. This sum is no longer unit-length, yet it is passed straight to `quat.rotation_matrix()`, whose formula (mat(0,0)=1-2*(yy+zz), ...) is only a valid rotation for a UNIT quaternion. Normalize `quat` to unit length before calling rotation_matrix() by invoking the existing `Quaternion::normalize` method defined in xcore/vec_mat.h. Reuse that helper at both sites; do not hand-roll the magnitude division inline."
rubric = "Correct iff a call to the existing Quaternion::normalize (e.g. quat.normalize()) is inserted on the summed quaternion before quat.rotation_matrix() in calc_camera_extrinsics, rather than dividing by the magnitude by hand or leaving the quaternion un-normalized."
