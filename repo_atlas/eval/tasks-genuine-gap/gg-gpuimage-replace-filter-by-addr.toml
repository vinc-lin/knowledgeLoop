id = "gg-gpuimage-replace-filter-by-addr"
kind = "dev"
repo = "android-gpuimage-plus"
prompt = "CGEImageHandler (library/src/main/jni/cge/common/cgeImageHandler.h) can delete a filter by pointer (deleteFilterByAddr) and replace a filter by position (replaceFilterAtIndex), but there is no replace-by-pointer. Add a method `bool replaceFilterByAddr(CGEImageFilterInterfaceAbstract* proc, const void* addr, bool bDelMem = true)` that swaps in a new filter at the slot currently holding `addr`. Resolve the address to an index using the existing CGEImageHandler::getFilterIndexByAddr helper and delegate to the existing replaceFilterAtIndex — do not hand-roll a second linear search over m_vecFilters."
rubric = "Correct iff the new replaceFilterByAddr is declared on CGEImageHandler in cgeImageHandler.h, defined in cgeImageHandler.cpp, and locates the slot via the existing getFilterIndexByAddr helper (then delegates to replaceFilterAtIndex). Incorrect if it open-codes its own loop over m_vecFilters / m_vecFilters.begin() instead of calling getFilterIndexByAddr."
required_apis = ["getFilterIndexByAddr"]
