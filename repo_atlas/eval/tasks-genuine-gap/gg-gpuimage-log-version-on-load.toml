id = "gg-gpuimage-log-version-on-load"
kind = "dev"
repo = "android-gpuimage-plus"
prompt = "The native entry point JNI_OnLoad in library/src/main/jni/interface/cgeNativeLibrary.cpp logs initialization progress but never reports which build of the library was loaded, which makes field bug reports ambiguous. Add a log line in JNI_OnLoad that reports the library version. Use the existing cgeGetVersion() accessor (which returns the CGE_VERSION string) via the project's CGE_LOG_INFO macro — do not hard-code the version literal \"3.0.0\" or re-read the CGE_VERSION macro directly."
rubric = "Correct iff JNI_OnLoad (in cgeNativeLibrary.cpp) gains a log statement whose version value comes from a call to cgeGetVersion(). Incorrect if it hard-codes the \"3.0.0\" literal, references the CGE_VERSION macro directly, or adds the call anywhere other than the native-load path in this file."
required_apis = ["cgeGetVersion"]
prior_art_files = [
  "library/src/main/jni/cge/common/cgeCommonDefine.cpp",
  "library/src/main/jni/cge/common/cgeCommonDefine.h",
]
# expected_files doubles as the GroundedUseScorer target site: the new call must land HERE, not in
