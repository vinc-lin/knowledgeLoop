# CROSS-REPO genuine-gap task (lap-8, gpuimage). cge helper in gpuimage-core, 0-hit in gpuimage-consumer snapshot.
# The capability to apply a vignette to the effect is provided only by the core library helper setVignette(float start, float end) declared on CGELomoFilter in filters/cgeMultipleEffectsCommon.h. That symbol has zero occurrences in the gpuimage-consumer snapshot (which excludes the cge core), so grep over the consumer yields nothing and the correct symbol name plus its two-argument start/end signature are recoverable only by following the consumer-to-core dependency across repositories via find_related. A consumer-only agent must either guess (likely producing a wrong name or arity) or reimplement the falloff inline.
id = "xr-gp-customfilters-set-vignette"
